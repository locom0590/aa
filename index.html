<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Ayna Terapisi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Giriş Ekranı */
        #setup-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }
        h1 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-align: center;
        }
        .btn-container {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:active {
            background: #0056b3;
        }

        /* VR Ekran Yapısı (Stereoskopik İkiye Bölünmüş Ana Ekran) */
        #vr-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sol ve Sağ Göz Alanları */
        .eye-view {
            width: 50%;
            height: 100%;
            float: left;
            position: relative;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.1); /* Merkez çizgisi rehberi */
        }

        /* Her gözün kendi içindeki ikiye bölünmüş yapısı */
        .half-screen {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        .left-half { left: 0; }
        .right-half { left: 50%; }

        /* Video Elementleri Şablonu */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }

        /* Efekt Sınıfları */
        .mirror-effect {
            transform: translate(-50%, -50%) scaleX(-1); /* Yatayda ayna yansıması */
        }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h1>VR AXIS REHABILITATION<br><small>Sağlam Tarafı Seçiniz</small></h1>
        <div class="btn-container">
            <button onclick="startApp('sag')">SAĞ</button>
            <button onclick="startApp('sol')">SOL</button>
        </div>
    </div>

    <div id="vr-container">
        
        <div class="eye-view" id="left-eye">
            <div class="half-screen left-half">
                <video id="v1" autoplay playsinline muted></video>
            </div>
            <div class="half-screen right-half">
                <video id="v2" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="eye-view" id="right-eye">
            <div class="half-screen left-half">
                <video id="v3" autoplay playsinline muted></video>
            </div>
            <div class="half-screen right-half">
                <video id="v4" autoplay playsinline muted></video>
            </div>
        </div>

    </div>

    <script>
        const setupMenu = document.getElementById('setup-menu');
        const vrContainer = document.getElementById('vr-container');
        
        const videos = [
            document.getElementById('v1'),
            document.getElementById('v2'),
            document.getElementById('v3'),
            document.getElementById('v4')
        ];

        async function startApp(selection) {
            // 1. Kullanıcıdan arka kamera izni isteyelim
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" }, // Arka kamerayı zorunlu kılar
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                // Video akışlarını elementlere bağla
                videos.forEach(video => {
                    video.srcObject = stream;
                });

            } catch (error) {
                console.warn("Arka kamera bulunamadı veya izin verilmedi, varsayılan kamera açılıyor...", error);
                // Eğer bilgisayarda test ediyorsanız veya arka kamera ismi tam eşleşmediyse fallback:
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videos.forEach(video => {
                        video.srcObject = fallbackStream;
                    });
                } catch (err) {
                    alert("Kamera erişimi sağlanamadı: " + err.message);
                    return;
                }
            }

            // 2. Ayna Modu Konfigürasyonu
            // Seçilen taraf "Gerçek Görüntü", diğer taraf ise onun "Yansıması (scaleX(-1))" olacak.
            // Bu mantık VR Box içindeki her iki göz (sol-sağ) ekranı için de birebir klonlanır.
            if (selection === 'sag') {
                // Sağ taraf normal, sol taraf sağın aynası
                document.querySelectorAll('.left-half video').forEach(v => v.classList.add('mirror-effect'));
            } else if (selection === 'sol') {
                // Sol taraf normal, sağ taraf solun aynası
                document.querySelectorAll('.right-half video').forEach(v => v.classList.add('mirror-effect'));
            }

            // 3. Ekranı Tam Ekran Yap ve VR Moduna Geç
            setupMenu.style.display = 'none';
            vrContainer.style.display = 'block';
            
            triggerFullscreen();
        }

        function triggerFullscreen() {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) { /* Safari */
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) { /* IE11 */
                element.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>
