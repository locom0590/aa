<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Ayna Terapisi & Senkronize İzleme</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            color: white;
        }

        /* Giriş Panelleri */
        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }
        h1 { margin-bottom: 25px; font-size: 1.6rem; text-align: center; }
        h2 { margin-bottom: 15px; font-size: 1.2rem; color: #aaa; }
        
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }
        
        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            transition: background 0.2s;
        }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-secondary { background: #6c757d; margin-top: 10px; width: 100%; }
        
        input, select {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: white;
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .room-id-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffc107;
            background: #222;
            padding: 10px 20px;
            border-radius: 6px;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        /* EKRAN MOTORU ALTYAPISI */
        .vr-display-engine {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .eye-view {
            width: 50%;
            height: 100%;
            float: left;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }
        .panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }
        .left-panel { left: 0; }
        .right-panel { left: 50%; }

        /* Video Yerleşim Kuralları (Genişlik lens ile sağlandığı için CSS normal tam ekrana çekildi) */
        .panel video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
        }
        
        .center-divider {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 100%;
            background-color: #ff0000;
            z-index: 5;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Güçlendirilmiş Aynalama Efekti */
        .mirror-effect {
            transform: scaleX(-1) !important;
        }

        /* Konteyner Gizleme Kuralları */
        #vr-container, #observer-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Terapist İçin Özel 2D Monitör Filtresi */
        #observer-container .eye-view {
            width: 100% !important;
            height: 100% !important;
            float: none;
        }
    </style>
</head>
<body>

    <div id="menu-role" class="menu-panel">
        <h1>VR AXIS REHABILITATION</h1>
        <div class="mode-selection">
            <button class="btn-primary" onclick="selectRole('patient')">HASTA MODU (VR Cihazı)</button>
            <button class="btn-success" onclick="selectRole('observer')">TERAPİST MODU (İzleme)</button>
        </div>
    </div>

    <div id="menu-patient" class="menu-panel" style="display:none;">
        <h2>Sağlam Tarafı Seçip Yayını Başlatın</h2>
        <div class="mode-selection">
            <button class="btn-primary" onclick="startPatientApp('sag')">SAĞ</button>
            <button class="btn-primary" onclick="startPatientApp('sol')">SOL</button>
            <button class="btn-secondary" onclick="location.reload()">Geri</button>
        </div>
    </div>

    <div id="menu-room-display" class="menu-panel" style="display:none;">
        <h2>Terapist İçin Bağlantı Kodu:</h2>
        <div class="room-id-display" id="room-id-text">Üretiliyor...</div>
        <p style="color:#aaa; text-align:center; font-size:0.9rem; margin-bottom:20px;">
            Bu kodu izleyici cihaza girip bağlantı kurulduktan sonra<br>telefonu VR Box'a yerleştirebilirsiniz.
        </p>
        <button class="btn-success" style="width:100%; max-width:320px;" onclick="activateVRView()">VR EKRANINA GEÇ</button>
    </div>

    <div id="menu-observer" class="menu-panel" style="display:none;">
        <h2>Bağlantı Bilgilerini Girin</h2>
        <div class="mode-selection">
            <input type="text" id="target-room-id" placeholder="Oda Kodu (Örn: 4821)">
            <button class="btn-success" onclick="startObserverApp()">CANLI YAYINI İZLE</button>
            <button class="btn-secondary" onclick="location.reload()">Geri</button>
        </div>
    </div>

    <div id="vr-container" class="vr-display-engine">
        <div class="eye-view" id="left-eye">
            <div class="panel left-panel"><video id="v1" autoplay playsinline muted></video></div>
            <div class="center-divider"></div>
            <div class="panel right-panel"><video id="v2" autoplay playsinline muted></video></div>
        </div>
        <div class="eye-view" id="right-eye">
            <div class="panel left-panel"><video id="v3" autoplay playsinline muted></video></div>
            <div class="center-divider"></div>
            <div class="panel right-panel"><video id="v4" autoplay playsinline muted></video></div>
        </div>
    </div>

    <div id="observer-container" class="vr-display-engine">
        <div class="eye-view">
            <div class="panel left-panel"><video id="t1" autoplay playsinline></video></div>
            <div class="center-divider"></div>
            <div class="panel right-panel"><video id="t2" autoplay playsinline></video></div>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let myRoomId = "";

        const patientVideos = [
            document.getElementById('v1'), document.getElementById('v2'),
            document.getElementById('v3'), document.getElementById('v4')
        ];
        
        const observerVideos = [
            document.getElementById('t1'), document.getElementById('t2')
        ];

        function selectRole(role) {
            document.getElementById('menu-role').style.display = 'none';
            if (role === 'patient') {
                document.getElementById('menu-patient').style.display = 'flex';
            } else {
                document.getElementById('menu-observer').style.display = 'flex';
            }
        }

        // HASTA MODU İŞLEMLERİ (Ultra Geniş Açı/0.5x Lens Filtresi Eklendi)
        async function startPatientApp(selection) {
            document.getElementById('menu-patient').style.display = 'none';
            document.getElementById('menu-room-display').style.display = 'flex';

            // Tarayıcıya ultra geniş açılı lensi (0.5x) seçmesini söyleyen kısıtlamalar
            const ultraWideConstraints = {
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    // Tarayıcılara geniş açılı donanımı seçmesi yönünde ipucu veren ileri seviye parametreler
                    advanced: [
                        { focusMode: "continuous" },
                        { exposureMode: "continuous" },
                        { whiteBalanceMode: "continuous" }
                    ]
                },
                audio: false
            };

            try {
                // Öncelikli olarak geniş açılı donanım profilini dene
                localStream = await navigator.mediaDevices.getUserMedia(ultraWideConstraints);
            } catch (error) {
                console.warn("Ultra geniş açı filtresi desteklenmedi, standart kameraya dönülüyor...", error);
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                } catch (fallbackError) {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                }
            }
            
            patientVideos.forEach(v => v.srcObject = localStream);

            // Hasta 3D ekranı bölgesel aynalama ayarı
            if (selection === 'sag') {
                document.querySelectorAll('#vr-container .left-panel video').forEach(v => v.classList.add('mirror-effect'));
            } else {
                document.querySelectorAll('#vr-container .right-panel video').forEach(v => v.classList.add('mirror-effect'));
            }

            myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room-id-text').innerText = myRoomId;

            peer = new Peer(myRoomId);
            peer.on('call', function(call) {
                call.answer(localStream, { metadata: { side: selection } });
            });
        }

        function activateVRView() {
            document.getElementById('menu-room-display').style.display = 'none';
            document.getElementById('vr-container').style.display = 'block';
            
            const element = document.documentElement;
            if (element.requestFullscreen) element.requestFullscreen();
            else if (element.webkitRequestFullscreen) element.webkitRequestFullscreen();
        }

        // TERAPİST MODU İŞLEMLERİ
        function startObserverApp() {
            const targetId = document.getElementById('target-room-id').value.trim();
            if (!targetId) { alert("Lütfen geçerli bir kod girin!"); return; }

            document.getElementById('menu-observer').style.display = 'none';
            document.getElementById('observer-container').style.display = 'block';

            peer = new Peer();
            peer.on('open', function() {
                const dummyCanvas = document.createElement('canvas');
                const dummyStream = dummyCanvas.captureStream ? dummyCanvas.captureStream() : null;
                
                const call = peer.call(targetId, dummyStream);
                
                call.on('stream', function(remoteStream) {
                    observerVideos.forEach(v => v.srcObject = remoteStream);
                    
                    const patientSelectedSide = call.metadata ? call.metadata.side : 'sag';
                    
                    // Terapist 2D ekranı otomatik senkronize aynalama ayarı
                    if (patientSelectedSide === 'sag') {
                        document.querySelectorAll('#observer-container .left-panel video').forEach(v => v.classList.add('mirror-effect'));
                    } else {
                        document.querySelectorAll('#observer-container .right-panel video').forEach(v => v.classList.add('mirror-effect'));
                    }
                });
            });
        }
    </script>
</body>
</html>
