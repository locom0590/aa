<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2D Geniş Açı Ayna Terapisi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Giriş Menüsü */
        #setup-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }
        h1 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-align: center;
        }
        .btn-container {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #28a745;
            color: white;
            transition: background 0.2s;
        }
        button:active {
            background: #1e7e34;
        }

        /* 2D İkiye Bölünmüş Ana Ekran */
        #mirror-container {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Ekranı dikey olarak tam ortadan ikiye bölen paneller */
        .panel {
            width: 50%;
            height: 100%;
            float: left;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* Ortadaki net ayrım çizgisi */
        #left-panel {
            border-right: 2px solid #333;
        }

        /* Video elementleri:contain kullanarak kameranın gördüğü 
           geniş açılı görüntüyü kırpmadan ekrana sığdırıyoruz */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Kameranın tüm açısını korur, görüntüyü kırpmaz */
        }

        /* Yatay Ayna Efekti */
        .mirror-effect {
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h1>2D AYNA TERAPİSİ<br><small>Sağlam Tarafı Seçiniz</small></h1>
        <div class="btn-container">
            <button onclick="startApp('sag')">SAĞ</button>
            <button onclick="startApp('sol')">SOL</button>
        </div>
    </div>

    <div id="mirror-container">
        
        <div class="panel" id="left-panel">
            <video id="video-left" autoplay playsinline muted></video>
        </div>

        <div class="panel" id="right-panel">
            <video id="video-right" autoplay playsinline muted></video>
        </div>

    </div>

    <script>
        const setupMenu = document.getElementById('setup-menu');
        const mirrorContainer = document.getElementById('mirror-container');
        
        const videoLeft = document.getElementById('video-left');
        const videoRight = document.getElementById('video-right');

        async function startApp(selection) {
            try {
                // Kameradan maksimum genişlikte veri alabilmek için yüksek çözünürlük hedefliyoruz
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920 }, // Geniş açı detayları için 1080p hedefi
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                
                videoLeft.srcObject = stream;
                videoRight.srcObject = stream;

            } catch (error) {
                console.warn("Arka kamera hatası, varsayılan kameraya geçiliyor...", error);
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videoLeft.srcObject = fallbackStream;
                    videoRight.srcObject = fallbackStream;
                } catch (err) {
                    alert("Kamera açılmadı: " + err.message);
                    return;
                }
            }

            // Seçim Mantığı (2D için):
            // Seçilen taraf orijinal kalır, karşı taraf o orijinal görüntünün tam aynası (yansıması) olur.
            if (selection === 'sag') {
                // Sağlam taraf Sağ ise: Sol taraf sağın aynası olur.
                videoLeft.classList.add('mirror-effect');
            } else if (selection === 'sol') {
                // Sağlam taraf Sol ise: Sağ taraf solun aynası olur.
                videoRight.classList.add('mirror-effect');
            }

            // Arayüzü değiştir ve tam ekrana geç
            setupMenu.style.display = 'none';
            mirrorContainer.style.display = 'block';
            
            triggerFullscreen();
        }

        function triggerFullscreen() {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
