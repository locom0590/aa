<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Ayna Terapisi - Dengeli Açı ve Kırmızı Sınır</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Giriş Menüsü */
        #setup-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
        }
        h1 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            text-align: center;
        }
        .btn-container {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:active {
            background: #0056b3;
        }

        /* VR Ana Konteyner */
        #vr-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sol ve Sağ Göz Bölmeleri */
        .eye-view {
            width: 50%;
            height: 100%;
            float: left;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        /* Her gözün kendi içindeki ikiye bölünmüş panelleri */
        .panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        .left-panel { left: 0; }
        .right-panel { left: 50%; }

        /* Videolar: 'cover' moduna alınarak aşırı geniş açı azaltıldı ve odak artırıldı */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* Her Gözün Tam Ortasına Gelecek Kalın Kırmızı Çubuk */
        .center-divider {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px; /* Çubuğun kalınlığı */
            height: 100%;
            background-color: #ff0000; /* Kırmızı renk */
            z-index: 5;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); /* Daha belirgin olması için hafif parlama */
        }

        /* Yatay Ayna Efekti */
        .mirror-effect {
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h1>VR AYNA TERAPİSİ<br><small>Sağlam Tarafı Seçiniz</small></h1>
        <div class="btn-container">
            <button onclick="startApp('sag')">SAĞ</button>
            <button onclick="startApp('sol')">SOL</button>
        </div>
    </div>

    <div id="vr-container">
        
        <div class="eye-view" id="left-eye">
            <div class="panel left-panel">
                <video id="v1" autoplay playsinline muted></video>
            </div>
            <div class="center-divider"></div>
            <div class="panel right-panel">
                <video id="v2" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="eye-view" id="right-eye">
            <div class="panel left-panel">
                <video id="v3" autoplay playsinline muted></video>
            </div>
            <div class="center-divider"></div>
            <div class="panel right-panel">
                <video id="v4" autoplay playsinline muted></video>
            </div>
        </div>

    </div>

    <script>
        const setupMenu = document.getElementById('setup-menu');
        const vrContainer = document.getElementById('vr-container');
        
        const videos = [
            document.getElementById('v1'),
            document.getElementById('v2'),
            document.getElementById('v3'),
            document.getElementById('v4')
        ];

        async function startApp(selection) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                videos.forEach(video => {
                    video.srcObject = stream;
                });

            } catch (error) {
                console.warn("Arka kamera hatası, varsayılan kameraya geçiliyor...", error);
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    videos.forEach(video => {
                        video.srcObject = fallbackStream;
                    });
                } catch (err) {
                    alert("Kamera açılmadı: " + err.message);
                    return;
                }
            }

            // Seçim Mantığı
            if (selection === 'sag') {
                document.querySelectorAll('.left-panel video').forEach(v => v.classList.add('mirror-effect'));
            } else if (selection === 'sol') {
                document.querySelectorAll('.right-panel video').forEach(v => v.classList.add('mirror-effect'));
            }

            // Arayüzü değiştir ve tam ekrana geç
            setupMenu.style.display = 'none';
            vrContainer.style.display = 'block';
            
            triggerFullscreen();
        }

        function triggerFullscreen() {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
